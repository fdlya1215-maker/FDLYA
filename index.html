<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片压缩工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #13131a;
    --surface-2: #1c1c28;
    --surface-3: #242436;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --success: #00cec9;
    --warning: #fdcb6e;
    --danger: #ff6b6b;
    --text: #e8e6f0;
    --text-muted: #6b6880;
    --text-dim: #44405a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 80%, rgba(0, 206, 201, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease;
  }

  .header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .header p {
    color: var(--text-muted);
    font-size: 0.95rem;
    font-weight: 300;
  }

  /* Drop Zone */
  .dropzone {
    border: 2px dashed var(--surface-3);
    border-radius: var(--radius);
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.7s ease;
  }

  .dropzone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, var(--accent-glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: var(--surface-2);
  }

  .dropzone:hover::before, .dropzone.dragover::before {
    opacity: 1;
  }

  .dropzone-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .dropzone-icon svg {
    width: 28px;
    height: 28px;
    stroke: var(--accent-light);
  }

  .dropzone-text {
    position: relative;
    z-index: 1;
  }

  .dropzone-text strong {
    display: block;
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .dropzone-text span {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  #fileInput { display: none; }

  /* Controls Panel */
  .controls {
    display: none;
    margin-top: 32px;
    animation: fadeUp 0.5s ease;
  }

  .controls.visible { display: block; }

  .panel {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    border: 1px solid var(--surface-2);
  }

  .panel-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* Slider */
  .slider-group {
    margin-bottom: 24px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .slider-label span {
    font-size: 0.9rem;
    color: var(--text);
  }

  .slider-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent-light);
    background: var(--surface-2);
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 500;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--surface-3);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    box-shadow: 0 0 12px var(--accent-glow);
    transition: transform 0.2s ease;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    box-shadow: 0 0 12px var(--accent-glow);
    cursor: pointer;
  }

  /* Format Select */
  .format-group {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .format-btn {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--surface-3);
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }

  .format-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .format-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  /* Resize */
  .resize-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
  }

  .resize-input-wrap {
    flex: 1;
    position: relative;
  }

  .resize-input-wrap label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .resize-input-wrap input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface-2);
    border: 1px solid var(--surface-3);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s ease;
  }

  .resize-input-wrap input[type="number"]:focus {
    border-color: var(--accent);
  }

  .resize-link {
    margin-top: 20px;
    color: var(--text-dim);
    font-size: 1.2rem;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }

  .resize-link.active { color: var(--accent-light); }
  .resize-link:hover { color: var(--accent-light); }

  /* Action Buttons */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .btn {
    flex: 1;
    padding: 14px 24px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 24px var(--accent-glow);
  }

  .btn-primary:hover {
    background: #7c6ef0;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px var(--accent-glow);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-secondary {
    background: var(--surface-2);
    color: var(--text-muted);
    border: 1px solid var(--surface-3);
  }

  .btn-secondary:hover {
    background: var(--surface-3);
    color: var(--text);
  }

  /* Result */
  .result {
    display: none;
    margin-top: 32px;
    animation: fadeUp 0.5s ease;
  }

  .result.visible { display: block; }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .result-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--surface-2);
  }

  .result-card-header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--surface-2);
  }

  .result-card-header span {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .result-card-header .size {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent-light);
  }

  .result-preview {
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    background: var(--surface-2);
  }

  .result-preview img {
    max-width: 100%;
    max-height: 280px;
    object-fit: contain;
    border-radius: 8px;
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .stat-item {
    flex: 1;
    min-width: 140px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
    border: 1px solid var(--surface-2);
    text-align: center;
  }

  .stat-item .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .stat-item .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3rem;
    font-weight: 500;
  }

  .stat-value.success { color: var(--success); }
  .stat-value.warning { color: var(--warning); }
  .stat-value.accent { color: var(--accent-light); }

  .btn-download {
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #00cec9);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-download:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(108, 92, 231, 0.4);
  }

  /* Image info */
  .image-info {
    display: none;
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--surface-2);
    font-size: 0.85rem;
    color: var(--text-muted);
    animation: fadeUp 0.4s ease;
  }

  .image-info.visible { display: flex; gap: 24px; flex-wrap: wrap; }

  .image-info span {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .app { padding: 24px 16px 40px; }
    .header h1 { font-size: 1.6rem; }
    .dropzone { padding: 40px 16px; }
    .result-grid { grid-template-columns: 1fr; }
    .format-group { flex-wrap: wrap; }
    .actions { flex-direction: column; }
    .stats-bar { flex-direction: column; }
    .image-info { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>图片压缩工具</h1>
    <p>本地处理，隐私安全 — 支持 JPG / PNG / WebP</p>
  </header>

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <div class="dropzone-text">
      <strong>拖拽图片到这里，或点击选择</strong>
      <span>支持 JPG、PNG、WebP 格式</span>
    </div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
  </div>

  <div class="image-info" id="imageInfo">
    <div>文件名：<span id="infoName">-</span></div>
    <div>尺寸：<span id="infoSize">-</span></div>
    <div>大小：<span id="infoBytes">-</span></div>
  </div>

  <div class="controls" id="controls">
    <div class="panel">
      <div class="panel-title">压缩设置</div>

      <div class="slider-group">
        <div class="slider-label">
          <span>输出质量</span>
          <span class="slider-value" id="qualityVal">80%</span>
        </div>
        <input type="range" id="quality" min="5" max="100" value="80">
      </div>

      <div class="panel-title" style="margin-top: 8px;">输出格式</div>
      <div class="format-group" id="formatGroup">
        <button class="format-btn active" data-format="image/jpeg">JPG</button>
        <button class="format-btn" data-format="image/png">PNG</button>
        <button class="format-btn" data-format="image/webp">WebP</button>
      </div>

      <div class="panel-title" style="margin-top: 8px;">调整尺寸（可选）</div>
      <div class="resize-row">
        <div class="resize-input-wrap">
          <label>宽度 (px)</label>
          <input type="number" id="resizeW" placeholder="原始宽度" min="1">
        </div>
        <div class="resize-link" id="resizeLock" title="锁定宽高比">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="resize-input-wrap">
          <label>高度 (px)</label>
          <input type="number" id="resizeH" placeholder="原始高度" min="1">
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="compressBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          开始压缩
        </button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
      </div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="result-grid">
      <div class="result-card">
        <div class="result-card-header">
          <span>原图</span>
          <span class="size" id="origSize">-</span>
        </div>
        <div class="result-preview">
          <img id="origPreview" src="" alt="原图">
        </div>
      </div>
      <div class="result-card">
        <div class="result-card-header">
          <span>压缩后</span>
          <span class="size" id="compSize">-</span>
        </div>
        <div class="result-preview">
          <img id="compPreview" src="" alt="压缩后">
        </div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">压缩率</div>
        <div class="stat-value success" id="statRatio">-</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">节省空间</div>
        <div class="stat-value warning" id="statSaved">-</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">输出尺寸</div>
        <div class="stat-value accent" id="statDim">-</div>
      </div>
    </div>

    <button class="btn-download" id="downloadBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      下载压缩图片
    </button>
  </div>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const controls = document.getElementById('controls');
  const qualitySlider = document.getElementById('quality');
  const qualityVal = document.getElementById('qualityVal');
  const compressBtn = document.getElementById('compressBtn');
  const resetBtn = document.getElementById('resetBtn');
  const result = document.getElementById('result');
  const downloadBtn = document.getElementById('downloadBtn');
  const imageInfo = document.getElementById('imageInfo');
  const resizeW = document.getElementById('resizeW');
  const resizeH = document.getElementById('resizeH');
  const resizeLock = document.getElementById('resizeLock');

  let originalFile = null;
  let originalImg = null;
  let compressedBlob = null;
  let lockRatio = true;
  let aspectRatio = 1;
  let selectedFormat = 'image/jpeg';

  resizeLock.classList.add('active');

  // Format buttons
  document.querySelectorAll('.format-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFormat = btn.dataset.format;
    });
  });

  // Lock ratio toggle
  resizeLock.addEventListener('click', () => {
    lockRatio = !lockRatio;
    resizeLock.classList.toggle('active', lockRatio);
  });

  resizeW.addEventListener('input', () => {
    if (lockRatio && resizeW.value) {
      resizeH.value = Math.round(resizeW.value / aspectRatio);
    }
  });

  resizeH.addEventListener('input', () => {
    if (lockRatio && resizeH.value) {
      resizeW.value = Math.round(resizeH.value * aspectRatio);
    }
  });

  // Quality slider
  qualitySlider.addEventListener('input', () => {
    qualityVal.textContent = qualitySlider.value + '%';
  });

  // Drag & Drop
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(2) + ' MB';
  }

  function handleFile(file) {
    if (!file.type.match(/^image\/(jpeg|png|webp)$/)) {
      alert('请上传 JPG、PNG 或 WebP 格式的图片');
      return;
    }

    originalFile = file;
    result.classList.remove('visible');
    compressedBlob = null;

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        originalImg = img;
        aspectRatio = img.width / img.height;
        resizeW.value = '';
        resizeH.value = '';

        document.getElementById('infoName').textContent = file.name;
        document.getElementById('infoSize').textContent = img.width + ' × ' + img.height;
        document.getElementById('infoBytes').textContent = formatBytes(file.size);
        imageInfo.classList.add('visible');

        document.getElementById('origPreview').src = e.target.result;

        controls.classList.add('visible');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  compressBtn.addEventListener('click', async () => {
    if (!originalImg) return;

    compressBtn.disabled = true;
    compressBtn.innerHTML = '<span class="spinner"></span> 压缩中...';

    // Small delay to let UI update
    await new Promise(r => setTimeout(r, 50));

    try {
      const quality = parseInt(qualitySlider.value) / 100;
      let w = resizeW.value ? parseInt(resizeW.value) : originalImg.width;
      let h = resizeH.value ? parseInt(resizeH.value) : originalImg.height;

      if (w < 1) w = originalImg.width;
      if (h < 1) h = originalImg.height;

      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');

      // Better downscaling
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(originalImg, 0, 0, w, h);

      canvas.toBlob((blob) => {
        compressedBlob = blob;
        const url = URL.createObjectURL(blob);

        document.getElementById('compPreview').src = url;
        document.getElementById('origSize').textContent = formatBytes(originalFile.size);
        document.getElementById('compSize').textContent = formatBytes(blob.size);

        const ratio = ((1 - blob.size / originalFile.size) * 100).toFixed(1);
        const saved = formatBytes(originalFile.size - blob.size);

        document.getElementById('statRatio').textContent = ratio > 0 ? ratio + '%' : '0%';
        document.getElementById('statSaved').textContent = (ratio > 0 ? '-' : '+') + saved;
        document.getElementById('statDim').textContent = w + ' × ' + h;

        // Update stat colors based on result
        const statRatio = document.getElementById('statRatio');
        statRatio.className = 'stat-value ' + (ratio > 50 ? 'success' : ratio > 20 ? 'warning' : 'accent');

        result.classList.add('visible');

        compressBtn.disabled = false;
        compressBtn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          重新压缩`;

        // Scroll to result
        result.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, selectedFormat, quality);
    } catch (err) {
      alert('压缩出错：' + err.message);
      compressBtn.disabled = false;
      compressBtn.innerHTML = '开始压缩';
    }
  });

  downloadBtn.addEventListener('click', () => {
    if (!compressedBlob) return;
    const ext = selectedFormat === 'image/png' ? 'png' : selectedFormat === 'image/webp' ? 'webp' : 'jpg';
    const name = originalFile.name.replace(/\.[^.]+$/, '') + '_compressed.' + ext;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(compressedBlob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  resetBtn.addEventListener('click', () => {
    originalFile = null;
    originalImg = null;
    compressedBlob = null;
    fileInput.value = '';
    controls.classList.remove('visible');
    result.classList.remove('visible');
    imageInfo.classList.remove('visible');
    qualitySlider.value = 80;
    qualityVal.textContent = '80%';
    resizeW.value = '';
    resizeH.value = '';
    document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.format-btn[data-format="image/jpeg"]').classList.add('active');
    selectedFormat = 'image/jpeg';
  });
</script>
</body>
</html>
